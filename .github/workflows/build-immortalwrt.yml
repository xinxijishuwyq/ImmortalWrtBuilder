name: Build ImmortalWrt Firmware

on:
  workflow_dispatch:
    inputs:
      diffconfig_file:
        description: "Path to OpenWrt diff config file in this repo (e.g. diff.config)"
        required: true
        default: "diff.config"
      upload_release:
        description: "Create GitHub release and upload firmware"
        type: boolean
        required: true
        default: false
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: Asia/Shanghai
      DIFFCONFIG_FILE: ${{ github.event.inputs.diffconfig_file || 'diff.config' }}
      UPLOAD_RELEASE: ${{ github.event_name == 'schedule' && 'true' || (github.event.inputs.upload_release == 'true' && 'true' || 'false') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore build caches
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          # ccache keeps compiled object hashes for compiler output reuse.
          path: ${{ github.workspace }}/.cache/openwrt/ccache
          key: openwrt-${{ runner.os }}-openwrt-25.12-${{ github.run_id }}
          restore-keys: |
            openwrt-${{ runner.os }}-openwrt-25.12-


      - name: Report cache status
        run: |
          PRIMARY_KEY="${{ steps.cache-restore.outputs.cache-primary-key }}"
          MATCHED_KEY="${{ steps.cache-restore.outputs.cache-matched-key }}"
          CACHE_HIT="${{ steps.cache-restore.outputs.cache-hit }}"

          echo "Cache primary key: ${PRIMARY_KEY}"
          if [ "${CACHE_HIT}" = "true" ]; then
            echo "ccache exact hit (primary key)."
          elif [ -n "${MATCHED_KEY}" ]; then
            echo "ccache fallback hit (restore-keys): ${MATCHED_KEY}"
          else
            echo "ccache miss (no cache restored for key/prefix). Build will proceed and save a new cache at the end."
          fi

      - name: Initialize build environment
        run: |
          sudo -E apt-get update
          sudo -E apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full \
            patch pkgconf python3 python3-pip python3-ply python3-docutils qemu-utils rsync scons squashfs-tools \
            subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Clone ImmortalWrt source
        run: |
          git clone --depth=1 --single-branch --branch "openwrt-25.12" https://github.com/immortalwrt/immortalwrt.git immortalwrt
          mkdir -p "${GITHUB_WORKSPACE}/.cache/openwrt/ccache"
          cd immortalwrt
          echo "CCACHE_DIR=${GITHUB_WORKSPACE}/.cache/openwrt/ccache" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=1500M" >> "$GITHUB_ENV"
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"

      - name: Load custom files
        run: |
          cd immortalwrt

          if [ -d "${GITHUB_WORKSPACE}/files" ]; then
            echo "Copying files/ overlay"
            cp -rf "${GITHUB_WORKSPACE}/files" ./
          fi

          if [ -f "${GITHUB_WORKSPACE}/diy-part1.sh" ]; then
            echo "Running diy-part1.sh"
            chmod +x "${GITHUB_WORKSPACE}/diy-part1.sh"
            "${GITHUB_WORKSPACE}/diy-part1.sh"
          fi

      - name: Update and install feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply config and custom scripts
        run: |
          cd immortalwrt

          DIFFCONFIG_PATH="${GITHUB_WORKSPACE}/${{ env.DIFFCONFIG_FILE }}"
          if [ ! -f "${DIFFCONFIG_PATH}" ]; then
            echo "Diffconfig file not found: ${DIFFCONFIG_PATH}"
            exit 1
          fi

          cp "${DIFFCONFIG_PATH}" .config
          echo "Using diffconfig: ${DIFFCONFIG_PATH}"
          grep -q '^CONFIG_CCACHE=y' .config || echo 'CONFIG_CCACHE=y' >> .config

          if [ -f "${GITHUB_WORKSPACE}/diy-part2.sh" ]; then
            echo "Running diy-part2.sh"
            chmod +x "${GITHUB_WORKSPACE}/diy-part2.sh"
            "${GITHUB_WORKSPACE}/diy-part2.sh"
          fi

          make defconfig

      - name: Download package sources
        run: |
          cd immortalwrt
          make download -j"$(nproc)"
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Build firmware
        id: build
        run: |
          cd immortalwrt
          echo "THREADS=$(nproc)" >> "$GITHUB_OUTPUT"
          make -j"$(nproc)" || make -j1 V=s
          ccache -s || true

      - name: Save build caches
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.cache/openwrt/ccache
          # Save a fresh cache snapshot on every run.
          key: openwrt-${{ runner.os }}-openwrt-25.12-${{ github.run_id }}

      - name: Prepare artifacts
        if: ${{ always() }}
        run: |
          cd immortalwrt
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          cp -rf bin/targets "${GITHUB_WORKSPACE}/artifacts/" || true
          cp -rf bin/packages "${GITHUB_WORKSPACE}/artifacts/" || true
          cp -rf logs "${GITHUB_WORKSPACE}/artifacts/" || true

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-firmware-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

      - name: Create release tag
        if: ${{ success() && env.UPLOAD_RELEASE == 'true' }}
        run: |
          echo "RELEASE_TAG=immortalwrt-openwrt-25.12-$(date +'%Y.%m.%d-%H%M')" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        if: ${{ success() && env.UPLOAD_RELEASE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: |
            artifacts/targets/**/*.bin
            artifacts/targets/**/*.img.gz
            artifacts/targets/**/*.itb
            artifacts/targets/**/*.manifest
            artifacts/targets/**/*.buildinfo
            artifacts/targets/**/*.json
            artifacts/targets/**/*.sha256sums
